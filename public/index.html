<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaints Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <h1 class="logo">Complaints Management System</h1>
      <div class="nav-links">
        <a href="index.html" class="active">Submit Complaint</a>
        <a href="admin.html">Admin Panel</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section id="submit-section">
      <h2>Submit a Complaint</h2>
      <form id="complaint-form">
        <div class="form-row">
          <div class="form-group">
            <label for="complainant_name">Full Name *</label>
            <input type="text" id="complainant_name" required>
          </div>
          <div class="form-group">
            <label for="complainant_email">Email *</label>
            <input type="email" id="complainant_email" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="complainant_phone">Phone</label>
            <input type="tel" id="complainant_phone">
          </div>
          <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" required>
              <option value="">Select Category</option>
              <option value="Service">Service</option>
              <option value="Billing">Billing</option>
              <option value="Technical">Technical</option>
              <option value="Product">Product</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" required>
        </div>
        <div class="form-group">
          <label for="description">Description *</label>
          <textarea id="description" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit Complaint</button>
      </form>
      <div id="form-message" class="message" style="display:none;"></div>
    </section>

    <section id="track-section">
      <h2>Track Your Complaint</h2>
      <div class="track-form">
        <input type="text" id="track-id" placeholder="Enter Complaint ID">
        <button onclick="trackComplaint()" class="btn btn-secondary">Track</button>
      </div>
      <div id="track-result" style="display:none;"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
