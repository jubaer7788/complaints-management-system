<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Complaints Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <h1 class="logo">Admin Panel</h1>
      <div class="nav-links">
        <a href="index.html">Submit Complaint</a>
        <a href="admin.html" class="active">Admin Panel</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section id="stats-section">
      <h2>Dashboard</h2>
      <div class="stats-grid">
        <div class="stat-card total"><h3>Total</h3><p id="stat-total">0</p></div>
        <div class="stat-card open"><h3>Open</h3><p id="stat-open">0</p></div>
        <div class="stat-card in-progress"><h3>In Progress</h3><p id="stat-in-progress">0</p></div>
        <div class="stat-card resolved"><h3>Resolved</h3><p id="stat-resolved">0</p></div>
        <div class="stat-card closed"><h3>Closed</h3><p id="stat-closed">0</p></div>
      </div>
    </section>

    <section id="manage-section">
      <h2>All Complaints</h2>
      <div class="filter-bar">
        <select id="status-filter" onchange="loadComplaints()">
          <option value="">All Statuses</option>
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Resolved">Resolved</option>
          <option value="Closed">Closed</option>
        </select>
      </div>
      <div id="complaints-list"></div>
    </section>
  </main>

  <div id="complaint-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 id="modal-title">Complaint Details</h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
